name: CI

on:
  push:
    branches: [master]
  pull_request:

# Same three gates as .githooks/pre-push: fmt, clippy (--all-targets), test.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libpam0g-dev libclang-dev \
            libseat-dev libudev-dev libfontconfig-dev libfreetype-dev \
            libpixman-1-dev libwayland-dev libxkbcommon-dev libinput-dev \
            libegl-dev libgles-dev libgbm-dev libdrm-dev xkb-data

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace
