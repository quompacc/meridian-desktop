name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# On every vX.Y.Z tag: build release notes from the changelog (git-cliff,
# latest section only) and publish a GitHub release for the tag.
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Meridian ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
